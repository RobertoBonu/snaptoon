kind = "web"
previewPath = "/"
title = "SnapToon"
version = "1.0.0"
id = "snptnWeb1A2B3C4D5E6F7"

[[services]]
localPort = 5000
name = "SnapToon"
paths = ["/"]

[services.env]
PORT = "5000"

[services.development]
run = "bash -lc 'cd /home/runner/workspace && exec bash start_v2_dev.sh'"

[services.production.build]
args = ["bash", "-lc", "cd /home/runner/workspace && bash build_v2.sh"]

[services.production.run]
args = ["bash", "-lc", "cd /home/runner/workspace && exec bash start_v2.sh"]

[services.production.run.env]
PORT = "5000"

[services.production.health.startup]
path = "/api/health"
