[alembic]
# Path to migration env.py
script_location = db/migrations

# Template per nomi file migrazione
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone per timestamp nei file
timezone = UTC

# Output max line length
output_encoding = utf-8

# DATABASE_URL viene letta da env in env.py — NON metterla qui

[post_write_hooks]
# Nessun post-hook per ora

# ============================================================
# Logging
# ============================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
