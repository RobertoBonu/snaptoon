[theme]
primaryColor = "#F59E0B"
backgroundColor = "#0D1017"
secondaryBackgroundColor = "#161B26"
textColor = "#E2E8F0"
font = "sans serif"

[server]
port = 8501
address = "0.0.0.0"
maxUploadSize = 10

[browser]
gatherUsageStats = false

[client]
# Disabilita la sidebar nav generata automaticamente dal multipage di
# Streamlit. Costruiamo la nav manualmente in app_state/ui.render_sidebar_nav()
# solo per utenti autenticati: così nella pagina di login NON c'è alcun
# link visibile (niente flash della sidebar). Inoltre permette di filtrare
# i link per ruolo senza ricorrere a CSS hide.
showSidebarNavigation = false
